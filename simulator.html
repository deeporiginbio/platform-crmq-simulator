<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRMQ Virtual Cluster Simulator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; }
    .resource-bar { height: 8px; border-radius: 4px; background: #334155; overflow: hidden; }
    .resource-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
    .reservation-banner { background: linear-gradient(90deg,#4c1d9520,#7c3aed30); border:1px solid #7c3aed80; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }
    .pulse-ring { animation: pulse 1.5s ease-out infinite; }
    @keyframes pulse { 0%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(1.6)} }
    .config-input { background:#0f172a; border:1px solid #334155; color:#e2e8f0; border-radius:6px; padding:6px 10px; width:100%; font-size:12px; }
    .config-input:focus { outline:none; border-color:#3b82f6; }
    .formula-box { background:#0f172a; border:1px solid #1e3a5f; border-radius:8px; padding:10px 14px; font-family:monospace; font-size:11px; color:#93c5fd; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ── Default config (all values editable in the UI) ────────────────────────
    const DEFAULT_CONFIG = {
      scoring: {
        orgWeight:    10000,
        userWeight:    1000,
        toolWeight:     100,
        agingFactor:      5,   // score pts per second of wait
      },
      scheduler: {
        topN:              10,
        skipThreshold:      3,  // skip_count > X triggers reservation mode
        backfillMaxRatio: 0.5,  // backfill job duration ≤ X × blocked job duration
      },
      cluster: {
        total:    { cpu: 32, memory: 128, gpu: 4 },
        reserved: { cpu:  4, memory:  16, gpu: 0 },
      },
      ttlDefault: 300,
    };

    const DEFAULT_ORGS = [
      { id: 'org-alpha', name: 'Org Alpha', priority: 3, limits: { cpu: 16, memory: 64,  gpu: 2 } },
      { id: 'org-beta',  name: 'Org Beta',  priority: 2, limits: { cpu:  8, memory: 32,  gpu: 1 } },
      { id: 'org-gamma', name: 'Org Gamma', priority: 1, limits: { cpu:  8, memory: 32,  gpu: 2 } },
    ];

    const PRESET_JOBS = [
      { name:'Ligand Prep',         orgId:'org-alpha', userPriority:3, toolPriority:2, resources:{cpu:2,  memory:8,  gpu:0}, estimatedDuration:45,  ttl:300 },
      { name:'GPU Docking (large)', orgId:'org-alpha', userPriority:5, toolPriority:4, resources:{cpu:4,  memory:16, gpu:2}, estimatedDuration:120, ttl:300 },
      { name:'Data Ingestion',      orgId:'org-beta',  userPriority:2, toolPriority:1, resources:{cpu:1,  memory:4,  gpu:0}, estimatedDuration:30,  ttl:200 },
      { name:'ML Training',         orgId:'org-beta',  userPriority:4, toolPriority:3, resources:{cpu:8,  memory:32, gpu:1}, estimatedDuration:180, ttl:400 },
      { name:'API Serving',         orgId:'org-gamma', userPriority:5, toolPriority:5, resources:{cpu:2,  memory:8,  gpu:0}, estimatedDuration:60,  ttl:250 },
      { name:'Pocket Finding',      orgId:'org-gamma', userPriority:3, toolPriority:2, resources:{cpu:4,  memory:16, gpu:1}, estimatedDuration:90,  ttl:300 },
      { name:'Parallel Docking ×4', orgId:'org-alpha', userPriority:4, toolPriority:3, resources:{cpu:16, memory:64, gpu:4}, estimatedDuration:200, ttl:500 },
      { name:'Quick Analysis',      orgId:'org-beta',  userPriority:2, toolPriority:1, resources:{cpu:1,  memory:2,  gpu:0}, estimatedDuration:15,  ttl:150 },
    ];

    // ── Utilities ────────────────────────────────────────────────────────────
    let _id = 1;
    const newId = () => `job-${String(_id++).padStart(3,'0')}`;

    const fmtTime = (s) => {
      s = Math.max(0, Math.floor(s));
      if (s < 60)   return `${s}s`;
      if (s < 3600) return `${Math.floor(s/60)}m ${s%60}s`;
      return `${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m`;
    };

    const calcScore = (job, now, cfg, orgs) => {
      const org  = orgs.find(o => o.id === job.orgId) || { priority: 1 };
      const wait = Math.max(0, now - job.enqueuedAt);
      const s    = cfg.scoring;
      return (
        org.priority     * s.orgWeight  +
        job.userPriority * s.userWeight +
        job.toolPriority * s.toolWeight +
        wait             * s.agingFactor
      );
    };

    const ZERO  = { cpu:0, memory:0, gpu:0 };
    const fits  = (req, avail) => req.cpu<=avail.cpu && req.memory<=avail.memory && req.gpu<=avail.gpu;
    const add3  = (a,b) => ({ cpu:a.cpu+b.cpu, memory:a.memory+b.memory, gpu:a.gpu+b.gpu });
    const sub3  = (a,b) => ({ cpu:a.cpu-b.cpu, memory:a.memory-b.memory, gpu:a.gpu-b.gpu });
    const sumRes= (jobs) => jobs.reduce((acc,j) => add3(acc,j.resources), {...ZERO});

    // ── Scheduler ────────────────────────────────────────────────────────────
    function runScheduler(queue, active, orgUsage, reservMode, reservTarget, now, cfg, orgs, log) {
      const inUse  = sumRes(active);
      const cl     = cfg.cluster;
      let   avail  = sub3(sub3(cl.total, cl.reserved), inUse);
      const sch    = cfg.scheduler;

      const ranked = [...queue]
        .map(j => ({ ...j, _score: calcScore(j, now, cfg, orgs) }))
        .sort((a,b) => b._score - a._score);

      const topN = ranked.slice(0, sch.topN);

      let nq = [...ranked];
      let na = [...active];
      let no = { ...orgUsage };
      let nr = reservMode;
      let nt = reservTarget;

      // Validate reservation target still in queue
      if (nr && nt && !nq.find(j => j.id === nt)) {
        nr = false; nt = null;
        log(now, '🔓 Reservation mode lifted — target no longer in queue', 'info');
      }

      let dispatched = false;

      for (const job of topN) {
        if (dispatched) break;

        const org       = orgs.find(o => o.id === job.orgId);
        const orgLimits = org?.limits ?? { cpu:9999, memory:9999, gpu:9999 };
        const orgUsed   = no[job.orgId] ?? { ...ZERO };

        // Gate 1: Org Quota
        const orgOk = (
          orgUsed.cpu    + job.resources.cpu    <= orgLimits.cpu    &&
          orgUsed.memory + job.resources.memory <= orgLimits.memory &&
          orgUsed.gpu    + job.resources.gpu    <= orgLimits.gpu
        );
        if (!orgOk) {
          log(now, `⛔ Gate 1 FAIL | ${job.name} [${job.id}] — ${org?.name} org quota exceeded (SKIP, don't block queue)`, 'warn');
          nq = nq.map(j => j.id===job.id ? {...j, skipCount:(j.skipCount||0)+1} : j);
          continue;
        }

        // Reservation mode: only let the target through
        if (nr && nt && job.id !== nt) {
          log(now, `🔒 Reservation mode | blocking ${job.name} [${job.id}] — accumulating resources for ${nt}`, 'warn');
          continue;
        }

        // Gate 2: Global Capacity
        const capOk = fits(job.resources, avail);
        if (!capOk) {
          const newSkip = (job.skipCount||0)+1;
          nq = nq.map(j => j.id===job.id ? {...j, skipCount:newSkip} : j);
          log(now, `⛔ Gate 2 FAIL | ${job.name} [${job.id}] — capacity insufficient. skip_count=${newSkip}/${sch.skipThreshold}`, 'warn');

          if (newSkip > sch.skipThreshold && !nr) {
            nr = true; nt = job.id;
            log(now, `🔒 RESERVATION MODE ON | ${job.name} [${job.id}] skipped ${newSkip}× — blocking new dispatches`, 'error');
          }

          // Backfill: only for top-priority blocked item, and only when NOT in reservation mode
          if (job.id === topN[0].id && !nr) {
            const candidates = ranked
              .filter(j => j.id!==job.id && j._score < job._score)
              .filter(j => fits(j.resources, avail))
              .filter(j => j.estimatedDuration <= job.estimatedDuration * sch.backfillMaxRatio);

            for (const bf of candidates) {
              const bfUsed   = no[bf.orgId] ?? { ...ZERO };
              const bfLimits = orgs.find(o=>o.id===bf.orgId)?.limits ?? {cpu:9999,memory:9999,gpu:9999};
              const bfOrgOk  = (
                bfUsed.cpu    + bf.resources.cpu    <= bfLimits.cpu    &&
                bfUsed.memory + bf.resources.memory <= bfLimits.memory &&
                bfUsed.gpu    + bf.resources.gpu    <= bfLimits.gpu
              );
              if (bfOrgOk) {
                na = [...na, { ...bf, startedAt:now, remainingDuration:bf.estimatedDuration }];
                nq = nq.filter(j => j.id!==bf.id);
                no = { ...no, [bf.orgId]: add3(no[bf.orgId]??ZERO, bf.resources) };
                avail = sub3(avail, bf.resources);
                log(now, `🔀 BACKFILL | ${bf.name} [${bf.id}] — fits gap, dur ${fmtTime(bf.estimatedDuration)} ≤ ${sch.backfillMaxRatio*100}% of blocked`, 'success');
                dispatched = true;
                break;
              }
            }
          }
          continue;
        }

        // ✅ All gates pass — dispatch!
        const wait = now - job.enqueuedAt;
        log(now, `✅ DISPATCH | ${job.name} [${job.id}] — score=${Math.round(job._score).toLocaleString()}, wait=${fmtTime(wait)}, resources: CPU:${job.resources.cpu} MEM:${job.resources.memory}GB GPU:${job.resources.gpu}`, 'success');
        na = [...na, { ...job, startedAt:now, remainingDuration:job.estimatedDuration }];
        nq = nq.filter(j => j.id!==job.id);
        no = { ...no, [job.orgId]: add3(no[job.orgId]??ZERO, job.resources) };
        avail = sub3(avail, job.resources);

        if (nr && nt===job.id) { nr=false; nt=null; log(now,'🔓 Reservation mode cleared — target dispatched','info'); }
        dispatched = true;
      }

      return { nq, na, no, nr, nt };
    }

    // ── App ───────────────────────────────────────────────────────────────────
    function App() {
      const [cfg,        setCfg]        = useState(DEFAULT_CONFIG);
      const [orgs,       setOrgs]       = useState(DEFAULT_ORGS);
      const [simTime,    setSimTime]    = useState(0);
      const [running,    setRunning]    = useState(false);
      const [speed,      setSpeed]      = useState(1);
      const [queue,      setQueue]      = useState([]);
      const [active,     setActive]     = useState([]);
      const [completed,  setCompleted]  = useState([]);
      const [evicted,    setEvicted]    = useState([]);
      const [logs,       setLogs]       = useState([]);
      const [reservMode, setReservMode] = useState(false);
      const [reservTarget,setReservTarget]=useState(null);
      const [orgUsage,   setOrgUsage]   = useState(Object.fromEntries(DEFAULT_ORGS.map(o=>[o.id,{...ZERO}])));
      const [showAdd,    setShowAdd]    = useState(false);
      const [showConfig, setShowConfig] = useState(false);

      const stateRef = useRef({});
      stateRef.current = { queue,active,completed,evicted,logs,orgUsage,simTime,reservMode,reservTarget,cfg,orgs };

      const log = useCallback((t,msg,type='info') => {
        setLogs(p => [{id:Math.random(),t,msg,type},...p].slice(0,150));
      }, []);

      const inUse = sumRes(active);
      const avail = sub3(sub3(cfg.cluster.total, cfg.cluster.reserved), inUse);

      // ── Tick ──────────────────────────────────────────────────────────────
      const tick = useCallback((dt) => {
        setSimTime(prev => {
          const s   = stateRef.current;
          const now = prev + dt;

          // 1. Progress running jobs
          const stillRunning = [];
          const done = [];
          let updOrg = { ...s.orgUsage };
          for (const j of s.active) {
            const rem = j.remainingDuration - dt;
            if (rem <= 0) {
              done.push({ ...j, completedAt:now });
              updOrg = { ...updOrg, [j.orgId]: sub3(updOrg[j.orgId]??ZERO, j.resources) };
              log(now, `🏁 COMPLETE | ${j.name} [${j.id}] — ran ${fmtTime(j.estimatedDuration)}, resources released`, 'success');
            } else {
              stillRunning.push({ ...j, remainingDuration:rem });
            }
          }

          // 2. TTL eviction
          const live=[]; const ev=[];
          for (const j of s.queue) {
            if ((now - j.enqueuedAt) >= j.ttl) {
              ev.push({...j,evictedAt:now});
              log(now,`⏰ TTL EVICT | ${j.name} [${j.id}] — waited ${fmtTime(now-j.enqueuedAt)}, TTL was ${fmtTime(j.ttl)}`,'error');
            } else live.push(j);
          }

          // 3. Scheduler
          const { nq,na,no,nr,nt } = runScheduler(live, stillRunning, updOrg, s.reservMode, s.reservTarget, now, s.cfg, s.orgs, log);

          setQueue(nq); setActive(na);
          setCompleted(p => [...done,...p].slice(0,60));
          setEvicted(p  => [...ev,...p].slice(0,30));
          setOrgUsage(no); setReservMode(nr); setReservTarget(nt);

          return now;
        });
      }, [log]);

      // Auto-run
      useEffect(() => {
        if (!running) return;
        const id = setInterval(() => tick(speed), 200);
        return () => clearInterval(id);
      }, [running, speed, tick]);

      const loadPreset = () => {
        const now = stateRef.current.simTime;
        const jobs = PRESET_JOBS.map((j,i) => ({
          ...j, id:newId(), enqueuedAt:now+i*3, skipCount:0,
          ttl: j.ttl ?? stateRef.current.cfg.ttlDefault,
        }));
        setQueue(p => [...p,...jobs]);
        log(now,`📦 Loaded ${jobs.length} preset jobs into queue`,'info');
      };

      const reset = () => {
        setSimTime(0); setRunning(false); setQueue([]); setActive([]);
        setCompleted([]); setEvicted([]); setLogs([]); setReservMode(false); setReservTarget(null);
        setOrgUsage(Object.fromEntries(orgs.map(o=>[o.id,{...ZERO}])));
      };

      const enqueue = (job) => {
        const j = { ...job, id:newId(), enqueuedAt:stateRef.current.simTime, skipCount:0 };
        setQueue(p => [...p,j]);
        log(stateRef.current.simTime,
          `📥 ENQUEUE | ${j.name} [${j.id}] — org=${j.orgId}, CPU:${j.resources.cpu} MEM:${j.resources.memory}GB GPU:${j.resources.gpu}, est=${fmtTime(j.estimatedDuration)}, TTL=${fmtTime(j.ttl)}`,
          'info');
      };

      return (
        <div className="min-h-screen p-4 space-y-3">

          {/* ── Header ── */}
          <div className="flex items-center justify-between flex-wrap gap-3">
            <div>
              <h1 className="text-xl font-bold text-white flex items-center gap-2">
                <span className="text-blue-400">⚙</span> CRMQ Virtual Cluster Simulator
              </h1>
              <p className="text-slate-400 text-xs mt-0.5">
                Cost &amp; Resource Management Queue ·{' '}
                <a href="https://deeporigin.atlassian.net/wiki/spaces/PLEN/pages/832897038" target="_blank" className="text-blue-400 hover:underline">Design Doc ↗</a>
              </p>
            </div>
            <div className="flex items-center gap-2 flex-wrap">
              <span className="text-slate-300 font-mono bg-slate-800 px-3 py-1.5 rounded text-sm">T = {fmtTime(simTime)}</span>
              <select value={speed} onChange={e=>setSpeed(+e.target.value)} className="bg-slate-700 text-white px-2 py-1.5 rounded text-sm border border-slate-600">
                <option value={1}>×1</option><option value={5}>×5</option><option value={10}>×10</option>
                <option value={30}>×30</option><option value={60}>×60</option>
              </select>
              <button onClick={()=>tick(1)}  disabled={running} className="px-3 py-1.5 bg-slate-600 hover:bg-slate-500 text-white rounded text-sm disabled:opacity-40">+1s</button>
              <button onClick={()=>tick(10)} disabled={running} className="px-3 py-1.5 bg-slate-600 hover:bg-slate-500 text-white rounded text-sm disabled:opacity-40">+10s</button>
              <button onClick={()=>setRunning(v=>!v)}
                className={`px-4 py-1.5 rounded text-sm font-bold transition-colors ${running?'bg-amber-600 hover:bg-amber-500':'bg-green-600 hover:bg-green-500'} text-white`}>
                {running ? '⏸ Pause' : '▶ Run'}
              </button>
              <button onClick={()=>setShowConfig(true)} className="px-3 py-1.5 bg-indigo-700 hover:bg-indigo-600 text-white rounded text-sm">⚙ Config</button>
              <button onClick={reset} className="px-3 py-1.5 bg-red-800 hover:bg-red-700 text-white rounded text-sm">↺ Reset</button>
            </div>
          </div>

          {/* ── Reservation mode banner ── */}
          {reservMode && (
            <div className="reservation-banner rounded-lg px-4 py-2.5 flex items-center gap-3">
              <div className="relative w-3 h-3">
                <div className="pulse-ring absolute inset-0 bg-purple-500 rounded-full" />
                <div className="absolute inset-0 bg-purple-400 rounded-full" />
              </div>
              <div>
                <span className="text-purple-300 font-bold text-sm">RESERVATION MODE ACTIVE</span>
                <span className="text-purple-200 text-xs ml-2">
                  No new dispatches — accumulating resources for: <code className="bg-purple-900/50 px-1 rounded">{reservTarget}</code>
                </span>
              </div>
            </div>
          )}

          {/* ── Main grid ── */}
          <div className="grid grid-cols-12 gap-3">
            <div className="col-span-3 space-y-3">
              <ClusterPanel cfg={cfg} inUse={inUse} avail={avail} />
              <OrgPanel orgs={orgs} orgUsage={orgUsage} />
            </div>
            <div className="col-span-5">
              <QueuePanel queue={queue} simTime={simTime} reservTarget={reservTarget} cfg={cfg} orgs={orgs}
                onAdd={()=>setShowAdd(true)} onLoadPreset={loadPreset} />
            </div>
            <div className="col-span-4 space-y-3">
              <ActivePanel jobs={active} simTime={simTime} />
              <HistoryPanel completed={completed} evicted={evicted} />
            </div>
          </div>

          <LogPanel logs={logs} />

          {showAdd    && <AddModal    cfg={cfg} orgs={orgs} onAdd={enqueue}             onClose={()=>setShowAdd(false)} />}
          {showConfig && <ConfigModal cfg={cfg} orgs={orgs} onSave={(c,o)=>{setCfg(c);setOrgs(o);}} onClose={()=>setShowConfig(false)} />}
        </div>
      );
    }

    // ── ClusterPanel ──────────────────────────────────────────────────────────
    function ClusterPanel({ cfg, inUse, avail }) {
      const cl = cfg.cluster;
      return (
        <div className="card p-4 space-y-3">
          <div className="flex items-center justify-between">
            <h2 className="text-slate-300 text-xs font-semibold uppercase tracking-wider">Cluster Resources</h2>
          </div>
          <ResBar label="CPU"    total={cl.total.cpu}    reserved={cl.reserved.cpu}    inUse={inUse.cpu}    unit="cores" color="#3b82f6" />
          <ResBar label="Memory" total={cl.total.memory} reserved={cl.reserved.memory} inUse={inUse.memory} unit="GB"    color="#8b5cf6" />
          <ResBar label="GPU"    total={cl.total.gpu}    reserved={cl.reserved.gpu}    inUse={inUse.gpu}    unit="cards" color="#10b981" />
          <div className="grid grid-cols-3 gap-1 pt-2 border-t border-slate-700">
            {[['CPU',avail.cpu,'cores'],['MEM',avail.memory,'GB'],['GPU',avail.gpu,'cards']].map(([l,v])=>(
              <div key={l} className="text-center">
                <div className={`font-bold text-base ${v>0?'text-green-400':'text-red-400'}`}>{v}</div>
                <div className="text-slate-500 text-xs">{l} free</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function ResBar({ label, total, reserved, inUse, unit, color }) {
      const rPct = total>0?(reserved/total)*100:0;
      const iPct = total>0?(inUse   /total)*100:0;
      const util = Math.round((inUse+reserved)/total*100);
      return (
        <div>
          <div className="flex justify-between text-xs mb-1">
            <span className="text-slate-300">{label}</span>
            <span className={`font-mono ${util>90?'text-red-400':util>70?'text-amber-400':'text-slate-400'}`}>
              {inUse+reserved}/{total} {unit} ({util}%)
            </span>
          </div>
          <div className="resource-bar flex">
            <div style={{width:`${rPct}%`,background:'#f59e0b40',borderRight:'1px solid #f59e0b60'}} title={`Reserved: ${reserved}`}/>
            <div style={{width:`${iPct}%`,background:util>90?'#dc2626':util>70?'#d97706':color}} title={`In Use: ${inUse}`}/>
          </div>
          <div className="flex gap-3 text-xs mt-0.5 text-slate-600">
            <span>🟡 {reserved} reserved</span>
            <span style={{color}}>● {inUse} in-use</span>
            <span className="text-green-700">◌ {total-reserved-inUse} free</span>
          </div>
        </div>
      );
    }

    // ── OrgPanel ─────────────────────────────────────────────────────────────
    function OrgPanel({ orgs, orgUsage }) {
      return (
        <div className="card p-4 space-y-3">
          <h2 className="text-slate-300 text-xs font-semibold uppercase tracking-wider">Org Quotas</h2>
          {orgs.map(org => {
            const used = orgUsage[org.id] ?? ZERO;
            return (
              <div key={org.id}>
                <div className="flex justify-between mb-1">
                  <span className="text-slate-200 text-xs font-medium">{org.name}</span>
                  <span className="text-xs text-slate-500">Priority P{org.priority}</span>
                </div>
                {[['CPU',used.cpu,org.limits.cpu,'cores'],['MEM',used.memory,org.limits.memory,'GB']].map(([l,u,lim])=>{
                  const p=Math.min(100,Math.round(u/lim*100));
                  return (
                    <div key={l} className="mb-1">
                      <div className="flex justify-between text-xs text-slate-500 mb-0.5"><span>{l}</span><span>{u}/{lim}</span></div>
                      <div className="resource-bar">
                        <div className="resource-fill" style={{width:`${p}%`,background:p>90?'#dc2626':p>70?'#d97706':'#22c55e'}}/>
                      </div>
                    </div>
                  );
                })}
                {org.limits.gpu > 0 && (() => {
                  const p = Math.min(100, Math.round(used.gpu/org.limits.gpu*100));
                  return (
                    <div>
                      <div className="flex justify-between text-xs text-slate-500 mb-0.5"><span>GPU</span><span>{used.gpu}/{org.limits.gpu}</span></div>
                      <div className="resource-bar">
                        <div className="resource-fill" style={{width:`${p}%`,background:p>90?'#dc2626':p>70?'#d97706':'#10b981'}}/>
                      </div>
                    </div>
                  );
                })()}
              </div>
            );
          })}
        </div>
      );
    }

    // ── QueuePanel ───────────────────────────────────────────────────────────
    function QueuePanel({ queue, simTime, reservTarget, cfg, orgs, onAdd, onLoadPreset }) {
      const s = cfg.scoring;
      const scored = [...queue]
        .map(j => ({ ...j, score:Math.round(calcScore(j,simTime,cfg,orgs)), wait:Math.max(0,simTime-j.enqueuedAt) }))
        .sort((a,b) => b.score-a.score);

      return (
        <div className="card p-4 flex flex-col" style={{minHeight:'520px'}}>
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-slate-300 text-xs font-semibold uppercase tracking-wider">
              Priority Queue
              <span className="ml-2 bg-blue-600/30 text-blue-300 font-mono px-2 py-0.5 rounded-full text-xs">{queue.length}</span>
            </h2>
            <div className="flex gap-2">
              <button onClick={onLoadPreset} className="text-xs px-3 py-1 bg-slate-700 hover:bg-slate-600 text-slate-200 rounded border border-slate-600">📦 Presets</button>
              <button onClick={onAdd} className="text-xs px-3 py-1 bg-blue-700 hover:bg-blue-600 text-white rounded">+ Add Job</button>
            </div>
          </div>

          {scored.length===0 && (
            <div className="flex-1 flex flex-col items-center justify-center text-slate-500 text-sm space-y-2">
              <div className="text-3xl">📭</div>
              <div>Queue is empty — load presets or add a job</div>
            </div>
          )}

          <div className="space-y-2 overflow-y-auto flex-1" style={{maxHeight:'430px'}}>
            {scored.map((job,i) => <QueueItem key={job.id} job={job} rank={i+1} isTarget={job.id===reservTarget} cfg={cfg} orgs={orgs} />)}
          </div>

          <div className="mt-3 pt-3 border-t border-slate-700">
            <div className="formula-box">
              Score = (Org P × <span className="text-amber-300">{s.orgWeight.toLocaleString()}</span>)
                    + (User P × <span className="text-amber-300">{s.userWeight.toLocaleString()}</span>)
                    + (Tool P × <span className="text-amber-300">{s.toolWeight.toLocaleString()}</span>)
                    + (Wait × <span className="text-blue-300">{s.agingFactor}</span>)
            </div>
          </div>
        </div>
      );
    }

    function QueueItem({ job, rank, isTarget, cfg, orgs }) {
      const org      = orgs.find(o => o.id===job.orgId);
      const ageBonus = Math.round(job.wait * cfg.scoring.agingFactor);
      const base     = job.score - ageBonus;
      const ttlPct   = Math.min(100, (job.wait/job.ttl)*100);

      return (
        <div className={`rounded-lg p-3 text-xs space-y-2 transition-all
          ${isTarget?'bg-purple-900/30 border border-purple-500/60':'bg-slate-800/80 border border-slate-700/60 hover:border-slate-600'}`}>
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-2 flex-wrap">
              <span className="text-slate-500 font-mono w-5 text-right">#{rank}</span>
              <span className="text-white font-semibold">{job.name}</span>
              <span className="text-slate-500 font-mono">[{job.id}]</span>
              {isTarget && <span className="text-purple-300">🔒</span>}
              {(job.skipCount||0)>0 && (
                <span className={`px-1.5 py-0.5 rounded text-xs ${(job.skipCount||0)>=cfg.scheduler.skipThreshold?'bg-red-900/50 text-red-300':'bg-amber-900/50 text-amber-300'}`}>
                  ×{job.skipCount} skips
                </span>
              )}
            </div>
            <span className="text-amber-300 font-bold font-mono shrink-0">{job.score.toLocaleString()}</span>
          </div>
          <div className="flex gap-3 text-slate-400 flex-wrap">
            <span>🏢 {org?.name} (P{org?.priority})</span>
            <span>👤 P{job.userPriority}</span>
            <span>🔧 P{job.toolPriority}</span>
            <span>⏳ {fmtTime(job.wait)}</span>
          </div>
          <div className="flex gap-2 text-slate-300 flex-wrap">
            <span className="bg-slate-700/60 px-1.5 py-0.5 rounded">CPU:{job.resources.cpu}</span>
            <span className="bg-slate-700/60 px-1.5 py-0.5 rounded">MEM:{job.resources.memory}GB</span>
            <span className="bg-slate-700/60 px-1.5 py-0.5 rounded">GPU:{job.resources.gpu}</span>
            <span className="bg-slate-700/60 px-1.5 py-0.5 rounded">Est:{fmtTime(job.estimatedDuration)}</span>
          </div>
          <div className="text-slate-600 flex gap-2">
            <span>Base: {base.toLocaleString()}</span><span>+</span>
            <span className="text-blue-500">Age: +{ageBonus.toLocaleString()}</span>
          </div>
          <div>
            <div className="flex justify-between text-slate-600 mb-0.5">
              <span>TTL</span>
              <span className={ttlPct>80?'text-red-400':ttlPct>60?'text-amber-400':''}>{fmtTime(job.ttl-job.wait)} left</span>
            </div>
            <div className="resource-bar">
              <div className="resource-fill" style={{width:`${ttlPct}%`,background:ttlPct>80?'#dc2626':ttlPct>60?'#d97706':'#64748b'}}/>
            </div>
          </div>
        </div>
      );
    }

    // ── ActivePanel ───────────────────────────────────────────────────────────
    function ActivePanel({ jobs, simTime }) {
      return (
        <div className="card p-4 space-y-3">
          <h2 className="text-slate-300 text-xs font-semibold uppercase tracking-wider">
            Running
            <span className="ml-2 bg-green-600/30 text-green-300 font-mono px-2 py-0.5 rounded-full text-xs">{jobs.length}</span>
          </h2>
          {jobs.length===0 && <div className="text-slate-500 text-xs text-center py-3">No running jobs</div>}
          <div className="space-y-2 overflow-y-auto" style={{maxHeight:'200px'}}>
            {jobs.map(j => {
              const elapsed = simTime - j.startedAt;
              const pct     = Math.min(100, Math.round(elapsed/j.estimatedDuration*100));
              return (
                <div key={j.id} className="bg-slate-800/60 rounded-lg p-2.5 text-xs space-y-1.5">
                  <div className="flex justify-between">
                    <span className="text-white font-medium">{j.name}</span>
                    <span className="text-green-400 font-mono">{fmtTime(j.remainingDuration)}</span>
                  </div>
                  <div className="text-slate-500 flex gap-2">
                    <span>CPU:{j.resources.cpu}</span><span>MEM:{j.resources.memory}GB</span><span>GPU:{j.resources.gpu}</span>
                    <span className="ml-auto">{pct}%</span>
                  </div>
                  <div className="resource-bar">
                    <div className="resource-fill" style={{width:`${pct}%`,background:pct>80?'#22c55e':'#16a34a'}}/>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ── HistoryPanel ──────────────────────────────────────────────────────────
    function HistoryPanel({ completed, evicted }) {
      return (
        <div className="card p-4 space-y-2">
          <h2 className="text-slate-300 text-xs font-semibold uppercase tracking-wider">
            History <span className="text-slate-600 ml-1">({completed.length} done · {evicted.length} evicted)</span>
          </h2>
          <div className="space-y-0.5 overflow-y-auto text-xs" style={{maxHeight:'120px'}}>
            {completed.slice(0,10).map(j=>(
              <div key={j.id+'c'} className="flex justify-between text-slate-400">
                <span>✅ {j.name}</span><span className="text-green-500">{fmtTime(j.estimatedDuration)}</span>
              </div>
            ))}
            {evicted.slice(0,5).map(j=>(
              <div key={j.id+'e'} className="flex justify-between text-slate-500">
                <span>⏰ {j.name}</span><span className="text-red-500">TTL evicted</span>
              </div>
            ))}
            {completed.length===0 && evicted.length===0 && <div className="text-slate-600 text-center py-2">No history yet</div>}
          </div>
        </div>
      );
    }

    // ── LogPanel ──────────────────────────────────────────────────────────────
    function LogPanel({ logs }) {
      const c = { success:'text-green-400', warn:'text-amber-400', error:'text-red-400', info:'text-slate-300' };
      return (
        <div className="card p-4">
          <h2 className="text-slate-300 text-xs font-semibold uppercase tracking-wider mb-2">Scheduling Log</h2>
          <div className="font-mono text-xs space-y-0.5 overflow-y-auto" style={{maxHeight:'140px'}}>
            {logs.length===0 && <div className="text-slate-600">Press ▶ Run or load presets to begin simulation…</div>}
            {logs.map(l=>(
              <div key={l.id} className={c[l.type]}>
                <span className="text-slate-600">[{fmtTime(l.t)}]</span> {l.msg}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ── AddModal ─────────────────────────────────────────────────────────────
    function AddModal({ cfg, orgs, onAdd, onClose }) {
      const [f, setF] = useState({
        name:'Custom Job', orgId:orgs[0]?.id, userPriority:3, toolPriority:2,
        cpu:2, memory:8, gpu:0, estimatedDuration:60, ttl:cfg.ttlDefault,
      });
      const set = (k,v) => setF(p=>({...p,[k]:v}));
      const org   = orgs.find(o=>o.id===f.orgId);
      const score = org
        ? org.priority*cfg.scoring.orgWeight + f.userPriority*cfg.scoring.userWeight + f.toolPriority*cfg.scoring.toolWeight
        : 0;

      return (
        <div className="fixed inset-0 bg-black/75 flex items-center justify-center z-50 p-4">
          <div className="card p-6 w-full max-w-md space-y-4">
            <div className="flex justify-between items-center">
              <h3 className="text-white font-bold">Enqueue New Job</h3>
              <button onClick={onClose} className="text-slate-400 hover:text-white text-2xl leading-none">×</button>
            </div>
            <div className="space-y-3 text-sm">
              <F label="Job Name">
                <input value={f.name} onChange={e=>set('name',e.target.value)} className="config-input"/>
              </F>
              <div className="grid grid-cols-3 gap-2">
                <F label="Org">
                  <select value={f.orgId} onChange={e=>set('orgId',e.target.value)} className="config-input">
                    {orgs.map(o=><option key={o.id} value={o.id}>{o.name}</option>)}
                  </select>
                </F>
                <F label="User P (1–5)">
                  <input type="number" min="1" max="5" value={f.userPriority} onChange={e=>set('userPriority',Math.min(5,Math.max(1,+e.target.value)))} className="config-input"/>
                </F>
                <F label="Tool P (1–5)">
                  <input type="number" min="1" max="5" value={f.toolPriority} onChange={e=>set('toolPriority',Math.min(5,Math.max(1,+e.target.value)))} className="config-input"/>
                </F>
              </div>
              <div className="grid grid-cols-3 gap-2">
                <F label="CPU (cores)"><input type="number" min="0" max="128" value={f.cpu} onChange={e=>set('cpu',+e.target.value)} className="config-input"/></F>
                <F label="Memory (GB)"><input type="number" min="0" max="512" value={f.memory} onChange={e=>set('memory',+e.target.value)} className="config-input"/></F>
                <F label="GPU (cards)"><input type="number" min="0" max="16" value={f.gpu} onChange={e=>set('gpu',+e.target.value)} className="config-input"/></F>
              </div>
              <div className="grid grid-cols-2 gap-2">
                <F label="Est. Duration (s)"><input type="number" min="1" value={f.estimatedDuration} onChange={e=>set('estimatedDuration',+e.target.value)} className="config-input"/></F>
                <F label="TTL (s)"><input type="number" min="10" value={f.ttl} onChange={e=>set('ttl',+e.target.value)} className="config-input"/></F>
              </div>
              <div className="formula-box space-y-1">
                <div className="text-slate-400 text-xs">Initial score (before aging):</div>
                <div className="text-amber-300 font-bold text-xl">{score.toLocaleString()}</div>
                <div className="text-slate-600 text-xs">
                  P{org?.priority}×{cfg.scoring.orgWeight.toLocaleString()} + P{f.userPriority}×{cfg.scoring.userWeight.toLocaleString()} + P{f.toolPriority}×{cfg.scoring.toolWeight.toLocaleString()}
                  <span className="text-blue-500"> + wait×{cfg.scoring.agingFactor}</span>
                </div>
              </div>
            </div>
            <div className="flex gap-3">
              <button onClick={onClose} className="flex-1 py-2 bg-slate-600 hover:bg-slate-500 text-white rounded text-sm">Cancel</button>
              <button
                onClick={()=>onAdd({name:f.name,orgId:f.orgId,userPriority:f.userPriority,toolPriority:f.toolPriority,
                  resources:{cpu:f.cpu,memory:f.memory,gpu:f.gpu},estimatedDuration:f.estimatedDuration,ttl:f.ttl})}
                className="flex-1 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded text-sm font-bold">
                Enqueue →
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ── ConfigModal ───────────────────────────────────────────────────────────
    function ConfigModal({ cfg, orgs, onSave, onClose }) {
      const [lc, setLc] = useState(JSON.parse(JSON.stringify(cfg)));
      const [lo, setLo] = useState(JSON.parse(JSON.stringify(orgs)));
      const [tab, setTab] = useState('scoring');

      const setS = (path, val) => {
        setLc(prev => {
          const next = JSON.parse(JSON.stringify(prev));
          const parts = path.split('.');
          let obj = next;
          for (let i=0; i<parts.length-1; i++) obj = obj[parts[i]];
          obj[parts[parts.length-1]] = isNaN(val) ? val : Number(val);
          return next;
        });
      };

      const setOrg = (idx, field, val) => {
        setLo(prev => {
          const next = JSON.parse(JSON.stringify(prev));
          if (field.includes('.')) {
            const [a,b] = field.split('.');
            next[idx][a][b] = Number(val);
          } else {
            next[idx][field] = field==='name' ? val : Number(val);
          }
          return next;
        });
      };

      const s   = lc.scoring;
      const sch = lc.scheduler;
      const cl  = lc.cluster;

      const TABS = ['scoring','scheduler','cluster','orgs'];

      return (
        <div className="fixed inset-0 bg-black/80 flex items-start justify-center z-50 p-4 overflow-y-auto">
          <div className="card w-full max-w-xl my-4">
            <div className="flex items-center justify-between p-5 border-b border-slate-700">
              <h3 className="text-white font-bold">⚙ Simulator Configuration</h3>
              <button onClick={onClose} className="text-slate-400 hover:text-white text-2xl leading-none">×</button>
            </div>

            {/* Tabs */}
            <div className="flex border-b border-slate-700">
              {TABS.map(t=>(
                <button key={t} onClick={()=>setTab(t)}
                  className={`px-5 py-3 text-sm font-medium capitalize transition-colors
                    ${tab===t?'text-blue-400 border-b-2 border-blue-400':'text-slate-400 hover:text-slate-200'}`}>
                  {t}
                </button>
              ))}
            </div>

            <div className="p-5 space-y-4">

              {tab==='scoring' && (
                <div className="space-y-4">
                  <div className="formula-box text-xs leading-relaxed">
                    Score = (Org P × <span className="text-amber-300">orgWeight</span>)
                           + (User P × <span className="text-amber-300">userWeight</span>)
                           + (Tool P × <span className="text-amber-300">toolWeight</span>)
                           + (WaitTime × <span className="text-blue-300">agingFactor</span>)
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <CF label="Org Weight" hint="Multiplier for org-level priority (×10k default)" value={s.orgWeight}    onChange={v=>setS('scoring.orgWeight',v)}    />
                    <CF label="User Weight" hint="Multiplier for per-user priority (×1k default)"   value={s.userWeight}   onChange={v=>setS('scoring.userWeight',v)}   />
                    <CF label="Tool Weight" hint="Multiplier for tool type priority (×100 default)"  value={s.toolWeight}   onChange={v=>setS('scoring.toolWeight',v)}   />
                    <CF label="Aging Factor" hint="Score pts added per second of wait time"          value={s.agingFactor}  onChange={v=>setS('scoring.agingFactor',v)}  />
                  </div>
                  <Preview cfg={lc} orgs={lo} />
                </div>
              )}

              {tab==='scheduler' && (
                <div className="space-y-4">
                  <div className="formula-box text-xs leading-relaxed">
                    Top-N dispatcher evaluates top <span className="text-amber-300">topN</span> items in queue.{'\n'}
                    Gate 1: Org quota check (SKIP on fail, don't block).{'\n'}
                    Gate 2: Cluster capacity check. After <span className="text-amber-300">skipThreshold</span> skips → Reservation Mode.{'\n'}
                    Backfill: candidate duration ≤ blocked × <span className="text-amber-300">backfillMaxRatio</span>.
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <CF label="Top N"              hint="Number of queue items evaluated per tick"                    value={sch.topN}             onChange={v=>setS('scheduler.topN',v)}             />
                    <CF label="Skip Threshold"     hint="skip_count > X triggers reservation mode"                   value={sch.skipThreshold}    onChange={v=>setS('scheduler.skipThreshold',v)}    />
                    <CF label="Backfill Max Ratio" hint="Backfill job must have duration ≤ this fraction of blocked"  value={sch.backfillMaxRatio} onChange={v=>setS('scheduler.backfillMaxRatio',v)} step="0.05" min="0" max="1" />
                    <CF label="Default TTL (s)"    hint="Default time-to-live for queued items"                      value={lc.ttlDefault}        onChange={v=>setS('ttlDefault',v)}                />
                  </div>
                </div>
              )}

              {tab==='cluster' && (
                <div className="space-y-4">
                  <div className="formula-box text-xs">
                    Available = Total − Reserved − InUse
                    <br/>Cluster Availability = AWS Quota − InUse + K8S Cluster
                  </div>
                  <div>
                    <div className="text-slate-300 text-xs font-semibold mb-2">Total Capacity</div>
                    <div className="grid grid-cols-3 gap-3">
                      <CF label="CPU (cores)" value={cl.total.cpu}    onChange={v=>setS('cluster.total.cpu',v)}    />
                      <CF label="Memory (GB)" value={cl.total.memory} onChange={v=>setS('cluster.total.memory',v)} />
                      <CF label="GPU (cards)" value={cl.total.gpu}    onChange={v=>setS('cluster.total.gpu',v)}    />
                    </div>
                  </div>
                  <div>
                    <div className="text-slate-300 text-xs font-semibold mb-2">Platform Reserved (K8s / system overhead)</div>
                    <div className="grid grid-cols-3 gap-3">
                      <CF label="CPU (cores)" value={cl.reserved.cpu}    onChange={v=>setS('cluster.reserved.cpu',v)}    />
                      <CF label="Memory (GB)" value={cl.reserved.memory} onChange={v=>setS('cluster.reserved.memory',v)} />
                      <CF label="GPU (cards)" value={cl.reserved.gpu}    onChange={v=>setS('cluster.reserved.gpu',v)}    />
                    </div>
                  </div>
                </div>
              )}

              {tab==='orgs' && (
                <div className="space-y-4">
                  {lo.map((org,i) => (
                    <div key={org.id} className="bg-slate-800/60 rounded-lg p-4 space-y-3">
                      <div className="flex items-center gap-2">
                        <div className="w-2 h-2 rounded-full bg-blue-400"/>
                        <span className="text-white text-sm font-semibold">{org.name}</span>
                        <span className="text-slate-500 text-xs font-mono">{org.id}</span>
                      </div>
                      <div className="grid grid-cols-4 gap-2">
                        <CF label="Org Priority" value={org.priority}      onChange={v=>setOrg(i,'priority',v)}       min="1" max="10" />
                        <CF label="CPU Limit"    value={org.limits.cpu}    onChange={v=>setOrg(i,'limits.cpu',v)}    />
                        <CF label="Memory Limit" value={org.limits.memory} onChange={v=>setOrg(i,'limits.memory',v)} />
                        <CF label="GPU Limit"    value={org.limits.gpu}    onChange={v=>setOrg(i,'limits.gpu',v)}    />
                      </div>
                    </div>
                  ))}
                </div>
              )}

            </div>

            <div className="flex gap-3 p-5 border-t border-slate-700">
              <button onClick={onClose} className="flex-1 py-2 bg-slate-600 hover:bg-slate-500 text-white rounded text-sm">Cancel</button>
              <button onClick={()=>{ onSave(lc,lo); onClose(); }}
                className="flex-1 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded text-sm font-bold">
                ✓ Apply Config
              </button>
            </div>
          </div>
        </div>
      );
    }

    // Score preview table inside config
    function Preview({ cfg, orgs }) {
      const s = cfg.scoring;
      const examples = [
        { orgId: orgs[0]?.id, userP:5, toolP:4, wait:0 },
        { orgId: orgs[1]?.id, userP:3, toolP:3, wait:0 },
        { orgId: orgs[2]?.id, userP:5, toolP:5, wait:0 },
        { orgId: orgs[0]?.id, userP:2, toolP:1, wait:120 },
        { orgId: orgs[2]?.id, userP:4, toolP:4, wait:60  },
      ];
      return (
        <div>
          <div className="text-slate-400 text-xs mb-2 font-semibold">Score Preview (sample jobs)</div>
          <table className="w-full text-xs">
            <thead>
              <tr className="text-slate-500 text-left">
                <th className="pb-1">Org</th><th>UserP</th><th>ToolP</th><th>Wait</th><th className="text-right text-amber-400">Score</th>
              </tr>
            </thead>
            <tbody>
              {examples.map((ex,i) => {
                const org   = orgs.find(o=>o.id===ex.orgId);
                const score = (org?.priority||1)*s.orgWeight + ex.userP*s.userWeight + ex.toolP*s.toolWeight + ex.wait*s.agingFactor;
                return (
                  <tr key={i} className="text-slate-300 border-t border-slate-700/50">
                    <td className="py-1">{org?.name}</td>
                    <td>{ex.userP}</td><td>{ex.toolP}</td><td>{ex.wait}s</td>
                    <td className="text-right font-mono text-amber-300 font-bold">{score.toLocaleString()}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      );
    }

    // ── Small helpers ─────────────────────────────────────────────────────────
    function F({ label, children }) {
      return (
        <div>
          <label className="text-slate-400 text-xs block mb-1">{label}</label>
          {children}
        </div>
      );
    }

    function CF({ label, hint, value, onChange, step='1', min, max }) {
      return (
        <div>
          <label className="text-slate-400 text-xs block mb-1" title={hint}>{label}{hint && <span className="ml-1 text-slate-600">ⓘ</span>}</label>
          <input
            type="number" step={step}
            min={min} max={max}
            value={value}
            onChange={e=>onChange(e.target.value)}
            className="config-input"
            title={hint}
          />
        </div>
      );
    }

    // ── Mount ─────────────────────────────────────────────────────────────────
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
